<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Audio Grabber Bookmarklet</title>
    <style>
      :root {
        --paper: #f6f1e8;
        --ink: #171717;
        --muted: #68604f;
        --line: #d7cbb7;
        --panel: #fffaf0;
        --accent: #007f7a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background:
          repeating-linear-gradient(0deg, rgba(23, 23, 23, 0.03), rgba(23, 23, 23, 0.03) 1px, transparent 1px, transparent 5px),
          var(--paper);
        font: 15px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      main {
        width: min(820px, calc(100vw - 36px));
        margin: 46px auto;
        display: grid;
        gap: 18px;
      }

      h1 {
        margin: 0;
        font-size: 30px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      .panel {
        padding: 18px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 18px 44px rgba(35, 28, 12, 0.14);
      }

      .bookmarklet {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 16px;
        color: #fff;
        background: var(--accent);
        border-radius: 6px;
        text-decoration: none;
      }

      ol {
        margin: 12px 0 0;
        padding-left: 22px;
      }

      code,
      textarea {
        font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      textarea {
        width: 100%;
        min-height: 180px;
        resize: vertical;
        margin-top: 10px;
        padding: 12px;
        color: var(--ink);
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Audio Grabber Bookmarklet</h1>
        <p>不安装 Chrome 扩展，直接在当前网页里扫描可见的音频 URL。</p>
      </header>

      <section class="panel">
        <a id="bookmarkletLink" class="bookmarklet" href="#">Audio Grabber</a>
        <ol>
          <li>显示书签栏：<code>View &gt; Always Show Bookmarks Bar</code>。</li>
          <li>把上面的 <code>Audio Grabber</code> 链接拖到书签栏。</li>
          <li>打开目标网页，先播放音频几秒，再点击这个书签。</li>
        </ol>
      </section>

      <section class="panel">
        <p>如果公司 Chrome 禁止 bookmarklet，可以复制下面这段到 DevTools Console 运行。</p>
        <textarea id="consoleSnippet" readonly></textarea>
      </section>
    </main>

    <script src="bookmarklet-source.js"></script>
    <script>
      const source = `(${window.audioGrabberBookmarklet.toString()})();`;
      document.querySelector("#bookmarkletLink").href = `javascript:${encodeURIComponent(source)}`;
      document.querySelector("#consoleSnippet").value = source;
    </script>
  </body>
</html>
