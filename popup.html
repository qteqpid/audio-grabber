<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Audio Resource Grabber</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Audio Grabber</h1>
          <p id="pageLabel">当前标签页</p>
        </div>
        <button id="scanButton" class="icon-button" type="button" title="重新扫描" aria-label="重新扫描">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 12a9 9 0 0 1-15.1 6.6l-2 2V14h6.6l-2.8 2.8A6.2 6.2 0 1 0 5.9 11H3a9 9 0 0 1 18 .9Z"></path>
          </svg>
        </button>
      </header>

      <section class="summary" aria-live="polite">
        <strong id="countLabel">0</strong>
        <span>个候选音频资源</span>
        <button id="downloadAllButton" type="button" disabled>全部下载</button>
      </section>

      <section id="status" class="status">点击扫描当前页面。</section>

      <ul id="results" class="results" aria-label="音频资源列表"></ul>
    </main>

    <template id="resultTemplate">
      <li class="resource">
        <div class="resource-main">
          <div class="resource-title"></div>
          <div class="resource-meta"></div>
          <div class="resource-url"></div>
        </div>
        <button class="download-button" type="button">下载</button>
      </li>
    </template>

    <script src="popup.js"></script>
  </body>
</html>
